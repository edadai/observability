name: edadai-observability

services:
  loki:
    image: grafana/loki:3.7.3
    container_name: edadai-loki
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - observability
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: edadai-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  grafana:
    image: grafana/grafana:13.1.0
    container_name: edadai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"

      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_SERVER_ENFORCE_DOMAIN: "true"

      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"

      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "true"

      # Prevent unlimited browser live connections behind Nginx.
      GF_LIVE_MAX_CONNECTIONS: "100"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:7000:3000"
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  observability:
    name: edadai-observability-net

volumes:
  loki-data:
    name: edadai-loki-data
  alloy-data:
    name: edadai-alloy-data
  grafana-data:
    name: edadai-grafana-data
